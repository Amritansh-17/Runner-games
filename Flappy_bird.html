<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            background: linear-gradient(to bottom, #64b5f6, #2196f3);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        
        .game-container {
            position: relative;
            width: min(90vw, 400px);
            height: min(135vw, 600px);
            max-width: 400px;
            max-height: 600px;
            aspect-ratio: 2/3;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            background: #87CEEB;
        }
        
        .game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: clamp(10px, 3vw, 20px);
            z-index: 10;
            transition: opacity 0.3s;
        }
        
        .start-screen {
            background: rgba(0, 0, 0, 0.7);
            color: white;
        }
        
        .game-over-screen {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: none;
        }

        /* ✅ RETRO CLOSE BUTTON */
.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  color: #ff4757; /* ✅ BRIGHT RED X */
  font-size: 27px;
  font-weight: bold;
  display: flex; /* ✅ PERFECT CENTERING */
  justify-content: center;
  align-items: center;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 20;
  font-family: system-ui, sans-serif;
  user-select: none;
  backdrop-filter: blur(4px);
}
.close-btn:hover {
  background: rgba(255, 255, 255, 0.35);
  transform: scale(1.1);
}
.close-btn:active { transform: scale(0.95); }
        
        .btn {
            background: #FFD700;
            color: #333;
            border: none;
            padding: clamp(10px, 3vw, 15px) clamp(20px, 5vw, 30px);
            font-size: clamp(12px, 4vw, 16px);
            font-family: 'Press Start 2P', cursive;
            border-radius: 50px;
            cursor: pointer;
            margin-top: clamp(15px, 4vw, 20px);
            transition: all 0.2s;
            box-shadow: 0 5px 0 #d4af37;
            width: auto;
            min-width: 150px;
        }
        
        .btn:hover { transform: translateY(2px); box-shadow: 0 3px 0 #d4af37; }
        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 #d4af37; }
        
        .score-display {
            position: absolute;
            top: clamp(10px, 3vw, 20px);
            left: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(24px, 8vw, 40px);
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
            pointer-events: none;
        }
        
        .high-score {
            position: absolute;
            top: clamp(50px, 12vw, 70px);
            left: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(12px, 4vw, 16px);
            color: yellow;
            text-shadow: 1px 1px 0 #000;
            z-index: 5;
            pointer-events: none;
        }
        
        .coin-count {
            position: absolute;
            top: clamp(80px, 18vw, 110px);
            left: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(12px, 4vw, 16px);
            color: gold;
            text-shadow: 1px 1px 0 #000;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-display">0</div>
        <div class="high-score">High Score: 0</div>
        <div class="coin-count">Coins: 0</div>

        <div class="screen start-screen">
            <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
            <h1 class="text-2xl md:text-4xl mb-4 md:mb-6">FLAPPY BIRD</h1>
            <div class="instructions">
                <p class="text-[10px] md:text-sm my-1">Press SPACE or TAP to FLAP</p>
                <p class="text-[10px] md:text-sm my-1">Avoid the pipes!</p>
                <p class="text-[10px] md:text-sm my-1">Collect coins for extra points!</p>
            </div>
            <button class="btn" id="start-btn">START GAME</button>
        </div>

        <div class="screen game-over-screen">
            <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
            <h1 class="text-2xl md:text-4xl mb-3 md:mb-4">GAME OVER</h1>
            <p class="text-xl md:text-2xl mb-2">Score: <span id="final-score">0</span></p>
            <p class="text-lg md:text-xl mb-2">Coins: <span id="final-coins">0</span></p>
            <p class="text-lg md:text-xl mb-4 md:mb-6">High Score: <span id="final-high-score">0</span></p>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>

        <canvas class="game-canvas" width="400" height="600"></canvas>
    </div>

<script>
    const canvas = document.querySelector('.game-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.querySelector('.game-container');
    const BASE_WIDTH = 400;
    const BASE_HEIGHT = 600;

    function resizeCanvas() {
        const containerRect = container.getBoundingClientRect();
        canvas.style.width = containerRect.width + 'px';
        canvas.style.height = containerRect.height + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const startScreen = document.querySelector('.start-screen');
    const gameOverScreen = document.querySelector('.game-over-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const scoreDisplay = document.querySelector('.score-display');
    const highScoreDisplay = document.querySelector('.high-score');
    const coinCountDisplay = document.querySelector('.coin-count');

    const pipeStyles = [
        { name: "classic", color: "#4CAF50", capColor: "#388E3C" },
        { name: "dark", color: "#37474F", capColor: "#263238" },
        { name: "neon", color: "#FF4081", capColor: "#FF4081", glow: true }
    ];

    let gameState = 'start';
    let score = 0;
    let coins = 0;
    let frames = 0;
    let difficultyLevel = 1;
    let animationId;
    let highScore = localStorage.getItem('flappyHighScore') || 0;
    highScoreDisplay.textContent = `High Score: ${highScore}`;

    const bird = {
        x: 80, y: BASE_HEIGHT / 2, radius: 15,
        velocity: 0, gravity: 0.4, jump: -8,
        wingFlapAngle: 0, wingFlapDirection: 1,
        draw: function() {
            ctx.fillStyle = '#FFEB3B';
            ctx.beginPath(); ctx.ellipse(this.x, this.y, 15, 12, 0, 0, Math.PI*2); ctx.fill();
            ctx.save();
            ctx.translate(this.x - 5, this.y); ctx.rotate(this.wingFlapAngle);
            ctx.fillStyle = '#FFC107'; ctx.beginPath(); ctx.ellipse(0, 5, 10, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(this.x + 7, this.y - 3, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(this.x + 7, this.y - 3, 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF5722'; ctx.beginPath(); ctx.moveTo(this.x + 12, this.y); ctx.lineTo(this.x + 22, this.y + 3); ctx.lineTo(this.x + 12, this.y + 6); ctx.closePath(); ctx.fill();
        },
        update: function() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            this.wingFlapAngle += 0.1 * this.wingFlapDirection;
            if (this.wingFlapAngle > 0.3 || this.wingFlapAngle < -0.3) this.wingFlapDirection *= -1;
            if (this.y + this.radius >= BASE_HEIGHT - 20) {
                this.y = BASE_HEIGHT - 20 - this.radius;
                if (gameState === 'playing') gameOver();
            }
            if (this.y - this.radius <= 0) { this.y = this.radius; this.velocity = 0; }
        },
        flap: function() { this.velocity = this.jump; }
    };

    const pipes = {
        position: [], gap: 280, dx: 0.8, baseSpeed: 0.8, maxYPos: -200,
        draw: function() {
            for (let p of this.position) {
                const style = pipeStyles.find(s => s.name === p.style) || pipeStyles[0];
                ctx.fillStyle = style.color;
                ctx.fillRect(p.x, p.y, p.width, p.height); // Top
                ctx.fillRect(p.x, p.y + p.height + this.gap, p.width, BASE_HEIGHT); // Bottom
                ctx.fillStyle = style.capColor;
                ctx.fillRect(p.x - 3, p.y + p.height - 20, p.width + 6, 20);
                ctx.fillRect(p.x - 3, p.y + p.height + this.gap, p.width + 6, 20);
            }
        },
        update: function() {
            if (gameState !== 'playing') return;
            if (frames > 100 && frames % 110 === 0) {
                this.position.push({ x: BASE_WIDTH, y: this.maxYPos * (Math.random() + 1), width: 60, height: 300, style: pipeStyles[Math.floor(Math.random()*3)].name, passed: false });
            }
            for (let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                p.x -= this.dx;
                if (p.x + p.width < bird.x - bird.radius && !p.passed) { p.passed = true; score++; scoreDisplay.textContent = score; }
                if (p.x + p.width <= 0) { this.position.splice(i, 1); i--; continue; }
                if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width) {
                    if (bird.y - bird.radius < p.y + p.height || bird.y + bird.radius > p.y + p.height + this.gap) gameOver();
                }
            }
        },
        reset: function() { this.position = []; this.gap = 280; this.dx = this.baseSpeed; }
    };

    const coinsArray = {
        position: [], radius: 10, dx: 2,
        draw: function() {
            for (let c of this.position) {
                ctx.fillStyle = 'gold'; ctx.beginPath(); ctx.arc(c.x, c.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(c.x - 3, c.y - 3, 3, 0, Math.PI * 2); ctx.fill();
            }
        },
        update: function() {
            if (gameState !== 'playing') return;
            if (frames % 150 === 0 && pipes.position.length > 0) {
                const lastPipe = pipes.position[pipes.position.length - 1];
                this.position.push({ x: lastPipe.x + 100, y: lastPipe.y + 300 + pipes.gap/2 });
            }
            for (let i = 0; i < this.position.length; i++) {
                let c = this.position[i]; c.x -= this.dx;
                const dist = Math.sqrt((bird.x - c.x)**2 + (bird.y - c.y)**2);
                if (dist < bird.radius + this.radius) { coins++; coinCountDisplay.textContent = `Coins: ${coins}`; this.position.splice(i, 1); i--; }
                else if (c.x < -20) { this.position.splice(i, 1); i--; }
            }
        },
        reset: function() { this.position = []; }
    };

    function gameLoop() {
        ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,BASE_WIDTH, BASE_HEIGHT); // Sky
        pipes.draw(); pipes.update();
        coinsArray.draw(); coinsArray.update();
        ctx.fillStyle = '#8B4513'; ctx.fillRect(0, BASE_HEIGHT-20, BASE_WIDTH, 20); // Ground
        bird.draw(); bird.update();
        frames++;
        animationId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
        gameState = 'playing';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        score = 0; coins = 0; frames = 0;
        scoreDisplay.textContent = score;
        coinCountDisplay.textContent = `Coins: ${coins}`;
        bird.y = BASE_HEIGHT / 2; bird.velocity = 0;
        pipes.reset(); coinsArray.reset();
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameOver() {
        gameState = 'gameover';
        gameOverScreen.style.display = 'flex';
        document.getElementById('final-score').textContent = score;
        document.getElementById('final-coins').textContent = coins;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappyHighScore', highScore);
            highScoreDisplay.textContent = `High Score: ${highScore}`;
        }
        document.getElementById('final-high-score').textContent = highScore;
    }

    function handleFlap() { if (gameState === 'playing') bird.flap(); else if (gameState === 'start') startGame(); }
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); handleFlap(); } });
    canvas.addEventListener('click', (e) => { e.preventDefault(); handleFlap(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleFlap(); }, { passive: false });

    gameLoop();
</script>
</body>
</html>
