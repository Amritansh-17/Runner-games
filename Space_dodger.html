<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Space Dodger 🚀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
  display: flex; justify-content: center; align-items: center;
  overflow: hidden;
}
#gameContainer {
  position: relative;
  width: min(90vw, 420px);
  aspect-ratio: 2 / 3;
  background: #0b0d17;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  overflow: hidden;
}
canvas { display: block; width: 100%; height: 100%; }

.ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.score-board { position: absolute; top: 15px; left: 15px; color: #00d2ff; font-size: clamp(16px, 4vw, 22px); font-weight: bold; text-shadow: 0 0 8px rgba(0,210,255,0.5); z-index: 10; }
.high-score-board { position: absolute; top: 15px; right: 15px; color: #FFD700; font-size: clamp(14px, 3.5vw, 18px); font-weight: bold; text-shadow: 0 0 8px rgba(255,215,0,0.5); z-index: 10; }

.screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(11, 13, 23, 0.85); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; padding: clamp(15px, 4vw, 25px); z-index: 20; pointer-events: auto;
}
.screen.hidden { display: none; }
h1 { font-size: clamp(26px, 7vw, 36px); color: white; margin-bottom: 10px; text-shadow: 0 0 12px rgba(255,255,255,0.3); }
.info { color: rgba(255,255,255,0.8); font-size: clamp(13px, 3.5vw, 16px); margin: 8px 0; line-height: 1.5; }
.final-score { color: #00d2ff; font-size: clamp(20px, 5vw, 28px); margin: 15px 0; font-weight: bold; }
.btn {
  padding: clamp(10px, 2.5vw, 14px) clamp(24px, 6vw, 40px);
  font-size: clamp(14px, 4vw, 20px);
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
  margin-top: clamp(15px, 4vw, 25px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:active { transform: translateY(2px); }

.close-btn {
  position: absolute; top: 15px; right: 15px;
  width: 40px; height: 40px;
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  color: #ff4757; font-size: 27px; font-weight: bold;
  display: flex; justify-content: center; align-items: center;
  text-decoration: none; cursor: pointer; transition: all 0.2s;
  z-index: 30; font-family: system-ui, sans-serif; user-select: none;
  backdrop-filter: blur(4px);
}
.close-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div class="ui-layer">
    <div class="score-board">Score: <span id="score">0</span></div>
    <div class="high-score-board">Best: <span id="highScore">0</span></div>
    
    <div class="screen" id="startScreen">
      <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
      <h1>🚀 Space Dodger</h1>
      <p class="info">Pilot your rocket through asteroids.<br>Collect ⭐ stars for points.<br><b>Click or Right-click to shoot!</b></p>
      <p class="info" style="color: #FFD700; font-weight: bold; margin-top: 10px;">Best Mission: <span id="startBestScore">0</span></p>
      <button class="btn" id="startBtn">LAUNCH</button>
    </div>

    <div class="screen hidden" id="gameOverScreen">
      <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
      <h1>Mission Failed</h1>
      <div class="final-score">Score: <span id="finalScore">0</span></div>
      <p class="info">Best Score: <span id="goHighScore">0</span></p>
      <button class="btn" id="restartBtn">RETRY</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const startBestScoreEl = document.getElementById('startBestScore'); // New element ref
const finalScoreEl = document.getElementById('finalScore');
const goHighScoreEl = document.getElementById('goHighScore');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');

let gameState = 'START';
let score = 0;
let highScore = parseInt(localStorage.getItem('spaceDodgerHighScore')) || 0;

// Sync High Score Displays immediately
highScoreEl.textContent = highScore;
startBestScoreEl.textContent = highScore;
goHighScoreEl.textContent = highScore;

const rocket = { x: W/2, y: H - 90, targetX: W/2, targetY: H - 90, speed: 0.14 };

function drawRocket(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#263238'; ctx.strokeStyle = '#455a64'; ctx.lineWidth = 2;
  // Wings
  ctx.beginPath(); ctx.moveTo(-14, 5); ctx.lineTo(-32, 22); ctx.lineTo(-16, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14, 5); ctx.lineTo(32, 22); ctx.lineTo(16, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Body
  ctx.fillStyle = '#e0e0e0'; ctx.beginPath(); ctx.moveTo(-10, -30); ctx.lineTo(10, -30); ctx.lineTo(13, 22); ctx.lineTo(-13, 22); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Stripe
  ctx.fillStyle = '#00d2ff'; ctx.fillRect(-11, -8, 22, 6);
  // Nose
  ctx.fillStyle = '#ff5252'; ctx.beginPath(); ctx.moveTo(-10, -30); ctx.lineTo(10, -30); ctx.lineTo(0, -48); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Cockpit
  ctx.fillStyle = '#00bcd4'; ctx.beginPath(); ctx.ellipse(0, -22, 6.5, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Flame
  const flameFlicker = Math.random() * 5 + 13;
  ctx.fillStyle = '#ff5722';
  ctx.beginPath(); ctx.moveTo(-8, 22); ctx.quadraticCurveTo(-11, 22 + flameFlicker, -5, 22); ctx.fill();
  ctx.beginPath(); ctx.moveTo(8, 22); ctx.quadraticCurveTo(11, 22 + flameFlicker, 5, 22); ctx.fill();
  ctx.restore();
}

let asteroids = [], stars = [], bgStars = [], bullets = [], particles = [];
let spawnRateAsteroid = 42, spawnRateStar = 125;
let fallSpeed = 2.9, starFallSpeed = 1.65;
let frame = 0, lastShot = 0;
const BULLET_SPEED = 10;
const SHOOT_COOLDOWN = 140;

for(let i=0; i<70; i++) bgStars.push({x: Math.random()*W, y: Math.random()*H, size: Math.random()*2+0.6, speed: Math.random()*1.3+0.5});

function spawnAsteroid() {
  const r = Math.random() * 18 + 13;
  const hp = Math.ceil(r / 7) + 1;
  asteroids.push({
    x: Math.random() * (W - 60) + 30, y: -50, r: r, hp: hp, maxHp: hp,
    speed: fallSpeed * (0.85 + Math.random() * 0.7),
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.08,
    points: Array.from({length: 10}, () => 0.7 + Math.random() * 0.6)
  });
}

function spawnStar() {
  stars.push({ x: Math.random() * (W - 40) + 20, y: -30, r: 12, speed: starFallSpeed });
}

function drawAsteroid(a) {
  ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
  ctx.fillStyle = '#546e7a'; ctx.strokeStyle = '#37474f'; ctx.lineWidth = 3;
  ctx.beginPath();
  for(let i = 0; i < 10; i++) {
    const angle = (i/10) * Math.PI * 2;
    const radius = a.r * a.points[i];
    ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawStar(s) {
  ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(frame * 0.045);
  ctx.fillStyle = '#ffeb3b'; ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 15;
  ctx.beginPath();
  for(let i = 0; i < 5; i++) {
    ctx.lineTo(Math.cos((i*72-18)*Math.PI/180)*s.r, Math.sin((i*72-18)*Math.PI/180)*s.r);
    ctx.lineTo(Math.cos((i*72+18)*Math.PI/180)*s.r*0.45, Math.sin((i*72+18)*Math.PI/180)*s.r*0.45);
  }
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.restore();
}

function shootBullet() {
  if (gameState !== 'PLAYING') return;
  const now = Date.now();
  if (now - lastShot < SHOOT_COOLDOWN) return;
  lastShot = now;
  bullets.push({ x: rocket.x, y: rocket.y - 30, vy: BULLET_SPEED });
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  rocket.targetX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  rocket.targetX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, {passive: false});

canvas.addEventListener('click', () => shootBullet());
canvas.addEventListener('contextmenu', e => { e.preventDefault(); shootBullet(); });

let keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

function updateRocket() {
  if(keys['ArrowLeft'] || keys['a']) rocket.targetX -= 8;
  if(keys['ArrowRight'] || keys['d']) rocket.targetX += 8;
  rocket.x += (rocket.targetX - rocket.x) * rocket.speed;
  rocket.x = Math.max(25, Math.min(W-25, rocket.x));
}

function checkCollision(obj1, obj2, r1, r2) {
  return Math.hypot(obj1.x - obj2.x, obj1.y - obj2.y) < r1 + r2;
}

function createExplosion(x, y, color, count) {
  for(let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 25 + Math.random()*18, color, size: 2.5 + Math.random()*3 });
  }
}

function update() {
  if(gameState !== 'PLAYING') return;
  frame++;
  updateRocket();

  if(frame % 500 === 0) {
    fallSpeed += 0.18;
    spawnRateAsteroid = Math.max(16, spawnRateAsteroid - 3);
  }

  if(frame % Math.floor(spawnRateAsteroid) === 0) spawnAsteroid();
  if(frame % Math.floor(spawnRateStar) === 0) spawnStar();

  for(let i = bullets.length-1; i >= 0; i--) {
    let b = bullets[i]; b.y -= b.vy;
    if(b.y < -20) { bullets.splice(i,1); continue; }
    for(let j = asteroids.length-1; j >= 0; j--) {
      let a = asteroids[j];
      if(checkCollision(b, a, 4, a.r)) {
        a.hp--; bullets.splice(i,1);
        createExplosion(b.x, b.y, '#00ffff', 6);
        if(a.hp <= 0) {
          score += a.maxHp * 2; scoreEl.textContent = score;
          createExplosion(a.x, a.y, '#ff9800', 18);
          asteroids.splice(j,1);
        }
        break;
      }
    }
  }

  for(let i = asteroids.length-1; i >= 0; i--) {
    let a = asteroids[i]; a.y += a.speed; a.rot += a.rotSpeed;
    if(checkCollision(rocket, a, 18, a.r - 4)) return gameOver();
    if(a.y > H + 80) asteroids.splice(i,1);
  }

  for(let i = stars.length-1; i >= 0; i--) {
    let s = stars[i]; s.y += s.speed;
    if(checkCollision(rocket, s, 18, s.r)) {
      score += 3; scoreEl.textContent = score;
      createExplosion(s.x, s.y, '#ffeb3b', 10);
      stars.splice(i,1);
    } else if(s.y > H + 40) stars.splice(i,1);
  }

  for(let i = particles.length-1; i >= 0; i--) {
    let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }

  bgStars.forEach(s => { s.y += s.speed; if(s.y > H) s.y = -5; });
}

function draw() {
  ctx.fillStyle = '#0b0d17'; ctx.fillRect(0, 0, W, H);
  bgStars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,0.85)`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
  });

  if(gameState !== 'START') {
    asteroids.forEach(drawAsteroid);
    stars.forEach(drawStar);
    bullets.forEach(b => {
      ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#a0ffff'; ctx.fillRect(b.x - 2, b.y - 14, 4, 20);
      ctx.shadowBlur = 0;
    });
    drawRocket(rocket.x, rocket.y);
    particles.forEach(p => {
      ctx.globalAlpha = p.life / 35; ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

function startGame() {
  gameState = 'PLAYING';
  score = 0; frame = 0; fallSpeed = 2.9;
  spawnRateAsteroid = 42; spawnRateStar = 125;
  asteroids = []; stars = []; bullets = []; particles = [];
  rocket.x = W/2; rocket.targetX = W/2;
  scoreEl.textContent = '0';
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
}

function gameOver() {
  gameState = 'GAME_OVER';
  if(score > highScore) {
    highScore = score;
    localStorage.setItem('spaceDodgerHighScore', highScore);
    highScoreEl.textContent = highScore;
    startBestScoreEl.textContent = highScore; // Sync start screen for next time
    goHighScoreEl.textContent = highScore;
  }
  finalScoreEl.textContent = score;
  gameOverScreen.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

loop();
</script>
</body>
</html>
