<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧟 Zombie Dash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(135deg, #0d0d15 0%, #1a1a2e 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; justify-content: center; align-items: center;
      margin: 0; padding: 0; overflow: hidden;
    }
    .game-container {
      position: relative;
      width: min(96vw, 480px); height: min(134vw, 672px);
      max-width: 480px; max-height: 672px; aspect-ratio: 5/7;
      background: linear-gradient(to bottom, #2c3e50 0%, #1a1a2e 70%, #0d0d15 100%);
      border-radius: 16px; box-shadow: 0 0 40px rgba(139,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.3);
      overflow: hidden; border: 3px solid #8b0000;
    }
    
    /* ✅ CLOSE BUTTON - Same as Snake reference: simple, inside screens */
.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  color: #ff4757; /* ✅ BRIGHT RED X */
  font-size: 27px;
  font-weight: bold;
  display: flex; /* ✅ PERFECT CENTERING */
  justify-content: center;
  align-items: center;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 20;
  font-family: system-ui, sans-serif;
  user-select: none;
  backdrop-filter: blur(4px);
}
.close-btn:hover {
  background: rgba(255, 255, 255, 0.35);
  transform: scale(1.1);
}
.close-btn:active { transform: scale(0.95); }

    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 20px; z-index: 50;
      background: rgba(15,15,30,0.95); transition: opacity 0.3s; backdrop-filter: blur(2px);
      pointer-events: auto;
    }
    /* ✅ Screen hidden = everything inside (including close btn) is hidden */
    .screen.hidden { display: none !important; }
    
    .screen h1 { color: #ff6b6b; font-size: clamp(16px,5vw,24px); margin: 0 0 10px; text-shadow: 0 0 8px rgba(255,100,100,0.6); line-height: 1.3; }
    .screen h1 span { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }
    .screen p { color: rgba(255,255,255,0.85); font-size: clamp(9px,2.4vw,11px); margin: 4px 0; line-height: 1.4; }
    .warning { color: #ff8888 !important; font-weight: bold !important; }
    .stats { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
    .stat-box { background: rgba(139,0,0,0.5); border: 2px solid #ff6b6b; padding: 6px 10px; border-radius: 8px; min-width: 65px; color: white; font-size: clamp(8px,2.2vw,9px); }
    .stat-value { color: #ffd700; font-size: 1.4em; display: block; margin-top: 2px; }
    .btn { background: linear-gradient(135deg, #ff4757, #c0392b); color: white; border: 2px solid #ff6b6b; padding: 12px 26px; font-size: clamp(11px,3vw,14px); font-family: inherit; border-radius: 50px; cursor: pointer; margin-top: 14px; box-shadow: 0 5px 0 #8b0000; min-width: 150px; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8b0000; filter: brightness(1.1); }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #8b0000; }

    .lives-display { display: flex; gap: 5px; margin-top: 6px; justify-content: center; }
    .life { width: 18px; height: 18px; background: #ff4757; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 5px rgba(255,71,87,0.7); transition: all 0.3s; }
    .life.lost { background: #444; box-shadow: none; border-color: #666; transform: scale(0.85); }

    .hud { position: absolute; top: 8px; left: 0; width: 100%; padding: 0 12px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 30; pointer-events: none; }
    .score-panel, .lives-panel { background: rgba(0,0,0,0.6); border: 2px solid #ff6b6b; border-radius: 8px; padding: 5px 10px; color: white; font-size: clamp(8px,2.4vw,10px); pointer-events: auto; }
    .score-value { color: #ffd700; font-size: 1.5em; display: block; margin-top: 1px; }

    .danger-line { position: absolute; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #ff0000 20%, #ff6b6b 50%, #ff0000 80%, transparent); box-shadow: 0 0 12px rgba(255,0,0,0.7); animation: pulse-line 1.5s infinite; z-index: 20; }
    @keyframes pulse-line { 0%,100%{opacity:0.8;box-shadow:0 0 12px rgba(255,0,0,0.7)} 50%{opacity:1;box-shadow:0 0 20px rgba(255,0,0,1)} }

    .muzzle-flash { position: absolute; width: 28px; height: 28px; background: radial-gradient(circle, #fff 0%, #ffd700 30%, #ff6b00 60%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 25; animation: flash 0.12s ease-out forwards; transform: translate(-50%,-50%); }
    @keyframes flash { 0%{opacity:1;transform:translate(-50%,-50%) scale(0.4)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.6)} }
    .hit-effect { position: absolute; width: 36px; height: 36px; background: radial-gradient(circle, rgba(255,50,50,0.9) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 24; animation: hit-pop 0.25s ease-out forwards; transform: translate(-50%,-50%); }
    @keyframes hit-pop { 0%{opacity:1;transform:translate(-50%,-50%) scale(0.2)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)} }
    .splatter { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, rgba(139,0,0,0.7) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 23; animation: splat-fade 0.5s ease-out forwards; }
    @keyframes splat-fade { 0%{opacity:0.9;transform:scale(0.2)} 100%{opacity:0;transform:scale(1)} }

    .cooldown-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 45px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; z-index: 25; display: none; }
    .cooldown-fill { height: 100%; width: 100%; background: #ffd700; transform-origin: left; transform: scaleX(0); transition: transform 0.08s linear; }

    #game-canvas { display: block; width: 100%; height: 100%; }
    @media (max-width: 420px) { .game-container { border-radius: 12px; border-width: 2px; } .close-btn { top: 10px; right: 10px; width: 38px; height: 38px; font-size: 22px; } }
    @media (max-height: 650px) { .game-container { height: 95vh; } .screen h1 { font-size: clamp(14px,4vw,20px); margin-bottom: 6px; } .btn { margin-top: 10px; padding: 10px 22px; } }
  </style>
</head>
<body>
  <div class="game-container" id="game-container">
    
    <!-- ✅ START SCREEN with close button INSIDE (like Snake reference) -->
    <div class="screen" id="start-screen">
      <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
      <h1>🧟 ZOMBIE<br><span>DASH</span> 🔫</h1>
      <p>Drag to move | Hold to shoot</p>
    <p class="warning">⚠️ If three zombies pass, you lose! </p>
      <div class="stats"><div class="stat-box">Best: <span class="stat-value" id="start-best">--</span></div></div>
      <div class="lives-display"><div class="life"></div><div class="life"></div><div class="life"></div></div>
      <button class="btn" id="start-btn">▶ SURVIVE</button>
    </div>
    
    <!-- ✅ GAME OVER SCREEN with close button INSIDE (like Snake reference) -->
    <div class="screen hidden" id="game-over-screen">
      <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
      <h1>💀 GAME<br><span>OVER</span> 💀</h1>
      <p>The horde broke through!</p>
      <div class="stats">
        <div class="stat-box">Score: <span class="stat-value" id="final-score">0</span></div>
        <div class="stat-box">Kills: <span class="stat-value" id="final-kills">0</span></div>
        <div class="stat-box">Best: <span class="stat-value" id="final-best">--</span></div>
      </div>
      <div class="lives-display"><div class="life lost"></div><div class="life lost"></div><div class="life lost"></div></div>
      <button class="btn" id="restart-btn">🔄 FIGHT AGAIN</button>
    </div>
    
    <!-- HUD (only visible during gameplay) -->
    <div class="hud" id="hud">
      <div class="score-panel">SCORE<br><span class="score-value" id="hud-score">0</span></div>
      <div class="lives-panel">LIVES<br><div class="lives-display" id="hud-lives"><div class="life"></div><div class="life"></div><div class="life"></div></div></div>
    </div>
    
    <div class="danger-line" id="danger-line"></div>
    <div class="cooldown-bar" id="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill"></div></div>
    <canvas id="game-canvas"></canvas>
  </div>

<script>
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('game-container');
  const BASE_WIDTH = 500, BASE_HEIGHT = 700;
  canvas.width = BASE_WIDTH; canvas.height = BASE_HEIGHT;

  const startScreen = document.getElementById('start-screen');
  const gameOverScreen = document.getElementById('game-over-screen');
  const hudScore = document.getElementById('hud-score');
  const hudLives = document.getElementById('hud-lives');
  const cooldownBar = document.getElementById('cooldown-bar');
  const cooldownFill = document.getElementById('cooldown-fill');

  function resizeCanvas() {
    const r = container.getBoundingClientRect();
    canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
    document.getElementById('danger-line').style.top = (r.height * 0.75) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
  window.addEventListener('load', () => setTimeout(resizeCanvas, 50));
  resizeCanvas();

  const DANGER_LINE_Y = BASE_HEIGHT * 0.75, GUN_Y = BASE_HEIGHT - 50, MAX_LIVES = 3, FIRE_RATE = 140;
  const ZOMBIE_TYPES = [
    { emoji: '🧟', speed: 1.0, health: 1, points: 10, color: '#5d7a5d' },
    { emoji: '🧟‍♂️', speed: 1.4, health: 2, points: 20, color: '#4a6b4a' },
    { emoji: '🧟‍♀️', speed: 1.8, health: 1, points: 25, color: '#6b4a6b' },
    { emoji: '👹', speed: 2.2, health: 3, points: 50, color: '#8b0000' }
  ];

  let gameState = 'start', score = 0, zombiesKilled = 0, lives = MAX_LIVES, zombiesPassed = 0;
  let bestScore = parseInt(localStorage.getItem('zombieDashBest')) || 0;
  let isPointerDown = false, lastFireTime = 0, isAiming = false;
  let zombies = [], bullets = [], particles = [];
  let gameTime = 0, difficultyLevel = 1, spawnTimer = 0, baseSpawnRate = 100;

  const gun = { x: BASE_WIDTH/2, y: GUN_Y, angle: -Math.PI/2, recoil: 0, minX: 35, maxX: BASE_WIDTH-35 };
  let touchStart = null, gunStartX = BASE_WIDTH/2;
  let aimTarget = { x: BASE_WIDTH/2, y: 100 };

  document.getElementById('start-best').textContent = bestScore || '--';
  document.getElementById('final-best').textContent = bestScore || '--';

  function getCoords(e) {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - r.left) * (BASE_WIDTH / r.width), y: (clientY - r.top) * (BASE_HEIGHT / r.height) };
  }

  function shoot() {
    if (gameState !== 'playing') return;
    bullets.push({ x: gun.x, y: gun.y - 18, vx: Math.cos(gun.angle)*14, vy: Math.sin(gun.angle)*14, size: 5, life: 70 });
    createFlash(gun.x, gun.y - 18);
    gun.recoil = 6;
  }

  function createFlash(x, y) {
    const f = document.createElement('div'); f.className = 'muzzle-flash';
    f.style.left = (x/BASE_WIDTH*100)+'%'; f.style.top = (y/BASE_HEIGHT*100)+'%';
    container.appendChild(f); setTimeout(() => f.remove(), 150);
  }
  function createHit(x, y) { const e = document.createElement('div'); e.className = 'hit-effect'; e.style.left=(x/BASE_WIDTH*100)+'%'; e.style.top=(y/BASE_HEIGHT*100)+'%'; container.appendChild(e); setTimeout(()=>e.remove(),250); }
  function createSplatter(x, y) { const e = document.createElement('div'); e.className = 'splatter'; e.style.left=(x/BASE_WIDTH*100)+'%'; e.style.top=(y/BASE_HEIGHT*100)+'%'; container.appendChild(e); setTimeout(()=>e.remove(),500); }
  function spawnParticles(x, y, c, n) { for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=1+Math.random()*2; particles.push({x,y,color:c, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1.5, life:12+Math.random()*10, maxLife:22, size:2+Math.random()*2}); } }

  function updateLives() {
    let h = ''; for(let i=0;i<MAX_LIVES;i++) h += `<div class="life ${i>=lives?'lost':''}"></div>`;
    hudLives.innerHTML = h;
  }

  // ✅ START GAME: Hide screens (close buttons auto-hidden via .hidden class)
  function startGame() {
    gameState = 'playing'; score = 0; zombiesKilled = 0; lives = MAX_LIVES; gameTime = 0; difficultyLevel = 1; spawnTimer = 0;
    zombies = []; bullets = []; particles = [];
    gun.x = BASE_WIDTH/2; gun.recoil = 0;
    hudScore.textContent = '0'; updateLives();
    startScreen.classList.add('hidden'); 
    gameOverScreen.classList.add('hidden');
    // ✅ NO JS needed for close button - it's inside screens, hidden automatically!
  }

  // ✅ GAME OVER: Show game over screen (close button auto-visible)
  function gameOver() {
    gameState = 'gameover';
    if (score > bestScore) { bestScore = score; localStorage.setItem('zombieDashBest', bestScore); }
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-kills').textContent = zombiesKilled;
    document.getElementById('final-best').textContent = bestScore;
    gameOverScreen.classList.remove('hidden');
    // ✅ Close button appears automatically because screen is no longer hidden
  }

  // Input
  canvas.addEventListener('mousedown', handleStart); canvas.addEventListener('touchstart', handleStart, {passive:false});
  canvas.addEventListener('mousemove', handleMove); canvas.addEventListener('touchmove', handleMove, {passive:false});
  canvas.addEventListener('mouseup', handleEnd); canvas.addEventListener('touchend', handleEnd); canvas.addEventListener('touchcancel', handleEnd);
  document.addEventListener('keydown', e => { if(e.code==='Space'){e.preventDefault(); gameState==='start'||gameState==='gameover'?startGame():isPointerDown=true;} });
  document.addEventListener('keyup', e => { if(e.code==='Space') isPointerDown=false; });
  document.getElementById('start-btn').onclick = startGame;
  document.getElementById('restart-btn').onclick = startGame;
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  function handleStart(e) { e.preventDefault(); if(gameState!=='playing') return; isPointerDown = true; touchStart = getCoords(e); gunStartX = gun.x; shoot(); lastFireTime = Date.now(); }
  function handleMove(e) { e.preventDefault(); if(gameState!=='playing'||!touchStart) return; const c = getCoords(e); aimTarget = c; isAiming = true; const dx = c.x - touchStart.x; if(Math.abs(dx)>5) gun.x = Math.max(gun.minX, Math.min(gun.maxX, gunStartX + dx)); }
  function handleEnd(e) { isPointerDown = false; }

  // Classes
  class Zombie {
    constructor(x, t) { this.x=x; this.y=-40; this.type=t; this.speed=t.speed*(1+difficultyLevel*0.12); this.health=t.health; this.maxHealth=t.health; this.points=t.points; this.emoji=t.emoji; this.size=36; this.wobble=Math.random()*Math.PI*2; this.wSpeed=0.04+Math.random()*0.04; this.hit=false; this.hitT=0; this.passed=false; }
    update() { this.wobble+=this.wSpeed; this.x+=Math.sin(this.wobble)*0.4; this.x=Math.max(this.size/2, Math.min(BASE_WIDTH-this.size/2, this.x)); this.y+=this.speed; if(this.hit){this.hitT--;if(this.hitT<=0)this.hit=false;} if(!this.passed && this.y-this.size/2>DANGER_LINE_Y){this.passed=true; lives--; updateLives(); createSplatter(this.x, DANGER_LINE_Y); if(lives<=0) gameOver();} }
    draw() { ctx.save(); ctx.translate(this.x, this.y); if(this.hit){ctx.shadowColor='#f00';ctx.shadowBlur=12;} ctx.font=`${this.size}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.emoji,0,0); if(this.maxHealth>1){ctx.fillStyle='#333';ctx.fillRect(-13,-this.size/2-7,26,3);ctx.fillStyle=this.hit?'#f44':'#4a2';ctx.fillRect(-13,-this.size/2-7,26*(this.health/this.maxHealth),3);} ctx.restore(); }
    takeDamage(n) { this.health-=n; this.hit=true; this.hitT=6; return this.health<=0; }
  }

  function checkCollisions() {
    for(let bi=bullets.length-1;bi>=0;bi--){ const b=bullets[bi]; for(let zi=zombies.length-1;zi>=0;zi--){ const z=zombies[zi]; if(Math.hypot(b.x-z.x, b.y-z.y)<z.size/2+b.size){ createHit(z.x, z.y); spawnParticles(z.x,z.y,'#f44',5); if(z.takeDamage(1)){score+=z.points; zombiesKilled++; hudScore.textContent=score; spawnParticles(z.x,z.y,z.type.color,10); createSplatter(z.x,z.y); zombies.splice(zi,1);} bullets.splice(bi,1); break;} } }
  }

  function drawBg() {
    const g=ctx.createLinearGradient(0,0,0,BASE_HEIGHT); g.addColorStop(0,'#1a1a2e'); g.addColorStop(0.75,'#0f3460'); g.addColorStop(1,'#0d0d15');
    ctx.fillStyle=g; ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);
    ctx.strokeStyle='rgba(100,120,180,0.06)'; ctx.lineWidth=1;
    for(let x=0;x<=BASE_WIDTH;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,BASE_HEIGHT);ctx.stroke();}
    for(let y=0;y<=BASE_HEIGHT;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(BASE_WIDTH,y);ctx.stroke();}
    ctx.fillStyle='rgba(139,0,0,0.1)'; ctx.fillRect(0,DANGER_LINE_Y,BASE_WIDTH,BASE_HEIGHT-DANGER_LINE_Y);
  }

  function drawGun() {
    ctx.save(); ctx.translate(gun.x, gun.y+gun.recoil); ctx.rotate(gun.angle);
    ctx.fillStyle='#555'; ctx.fillRect(-6,-42,12,42);
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.roundRect(-16,-6,32,20,4); ctx.fill();
    ctx.fillStyle='#666'; ctx.fillRect(-12,-3,24,5);
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,-42,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if(gun.recoil>0)gun.recoil*=0.85; if(gun.recoil<0.3)gun.recoil=0;
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(gun.minX,gun.y); ctx.lineTo(gun.maxX,gun.y); ctx.stroke(); ctx.setLineDash([]);
  }

  function drawAim() {
    if(!isAiming||gameState!=='playing')return;
    ctx.save(); ctx.setLineDash([3,5]); ctx.strokeStyle='rgba(255,100,100,0.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(gun.x, gun.y-22);
    const dx=aimTarget.x-gun.x, dy=aimTarget.y-gun.y, d=Math.hypot(dx,dy)||1;
    ctx.lineTo(gun.x+dx/d*160, gun.y+dy/d*160); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  }

  function updateAngle() {
    const dx=aimTarget.x-gun.x, dy=aimTarget.y-gun.y;
    gun.angle=Math.atan2(dy,dx);
    if(gun.angle>-0.15)gun.angle=-0.15; if(gun.angle<-Math.PI+0.15)gun.angle=-Math.PI+0.15;
  }

  // Game Loop
  function loop() {
    ctx.clearRect(0,0,BASE_WIDTH,BASE_HEIGHT);
    if(gameState==='playing') {
      gameTime++; if(gameTime%300===0){difficultyLevel++; baseSpawnRate=Math.max(25,baseSpawnRate-7);}
      spawnTimer++; if(spawnTimer>=baseSpawnRate){zombies.push(new Zombie(30+Math.random()*(BASE_WIDTH-60), ZOMBIE_TYPES[Math.random()<0.7?0:Math.random()<0.5?1:Math.random()<0.5?2:3])); spawnTimer=0;}
      
      // ✅ CONTINUOUS FIRE WHILE HOLDING
      if(isPointerDown && Date.now()-lastFireTime>=FIRE_RATE){ 
        lastFireTime=Date.now(); shoot(); 
        cooldownBar.style.display='block'; cooldownFill.style.transform='scaleX(1)'; 
        setTimeout(()=>{cooldownFill.style.transform='scaleX(0)'; setTimeout(()=>cooldownBar.style.display='none',100);},150); 
      }
      
      for(let i=zombies.length-1;i>=0;i--){zombies[i].update();if(zombies[i].y>BASE_HEIGHT+50)zombies.splice(i,1);}
      for(let i=bullets.length-1;i>=0;i--){bullets[i].x+=bullets[i].vx;bullets[i].y+=bullets[i].vy;bullets[i].life--;if(bullets[i].x<-30||bullets[i].x>BASE_WIDTH+30||bullets[i].y<-30||bullets[i].y>BASE_HEIGHT+30||bullets[i].life<=0)bullets.splice(i,1);}
      for(let i=particles.length-1;i>=0;i--){particles[i].x+=particles[i].vx;particles[i].y+=particles[i].vy;particles[i].vy+=0.1;particles[i].life--;if(particles[i].life<=0)particles.splice(i,1);}
      checkCollisions(); updateAngle();
    }
    drawBg(); particles.forEach(p=>{const a=p.life/p.maxLife; ctx.globalAlpha=a; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;});
    zombies.forEach(z=>z.draw()); bullets.forEach(b=>{ctx.fillStyle='rgba(255,215,0,0.5)';ctx.beginPath();ctx.arc(b.x,b.y,b.size+2,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();});
    drawAim(); if(gameState==='playing')drawGun();
    requestAnimationFrame(loop);
  }

  updateLives(); drawBg(); drawGun(); loop();
</script>
