<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ping Pong AI 🏓</title>
<style>
/* --- Core Styling --- */
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

html, body {
    width: 100%; height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
}

#gameContainer {
    position: relative;
    width: min(96vw, 96vh * 2 / 3);
    aspect-ratio: 2 / 3;
    max-width: 540px;
    background: #111;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border-radius: 16px;
    overflow: hidden;
    border: 4px solid rgba(255,255,255,0.1);
}

canvas { display: block; width: 100%; height: 100%; }

/* --- UI Layer --- */
.ui-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white;
}

.score-board {
    position: absolute;
    top: clamp(10px, 3vw, 20px);
    width: 100%;
    display: flex;
    justify-content: space-around;
    font-size: clamp(24px, 6vw, 32px);
    font-weight: bold;
    font-family: 'Courier New', monospace;
    z-index: 10;
}

.win-streak-tag {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    color: #6dd5ed;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.player-label {
    position: absolute;
    font-size: 10px;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
}

/* --- Screens --- */
.screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 30px; z-index: 20;
    pointer-events: auto;
}
.screen.hidden { display: none; }

.btn {
    padding: 16px 40px; font-size: 18px;
    background: linear-gradient(135deg, #6dd5ed, #2193b0);
    color: white; border: none; border-radius: 50px;
    cursor: pointer; font-weight: bold; text-transform: uppercase;
    transition: all 0.2s; margin-top: 20px;
}
.btn:hover { transform: scale(1.05); filter: brightness(1.1); }

.close-btn {
    position: absolute; top: 15px; right: 15px;
    width: 40px; height: 40px;
    background: rgba(255, 255, 255, 0.1); border-radius: 50%;
    color: #ff4757; font-size: 24px; display: flex;
    justify-content: center; align-items: center;
    text-decoration: none; z-index: 30; pointer-events: auto;
}

/* Animations */
.shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    30%, 70% { transform: translate3d(4px, 0, 0); }
    40%, 60% { transform: translate3d(-4px, 0, 0); }
}
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="ui-layer">
        <div class="score-board">
            <div style="position:relative;">
                <span class="player-label" style="top:-15px; left:0;">CPU</span>
                <span id="aiScore">0</span>
            </div>
            <div style="position:relative;">
                <span class="player-label" style="top:-15px; right:0;">YOU</span>
                <span id="playerScore">0</span>
            </div>
        </div>

        <div class="win-streak-tag">BEST STREAK: <span id="bestStreak">0</span></div>

        <a href="index.html" class="close-btn">&times;</a>

        <div class="screen" id="startScreen">
            <h1>🏓 PING PONG</h1>
            <p style="color: #888; margin-bottom: 20px;">Use Mouse, Keys (A/D), or Touch.<br>First to 7 wins.</p>
            <div style="margin-bottom: 15px;">
                <p style="font-size: 12px; color: #555;">RECORD WINS</p>
                <p id="recordWins" style="font-size: 24px; color: #fff;">0</p>
            </div>
            <button class="btn" id="startBtn">START</button>
        </div>

        <div class="screen hidden" id="gameOverScreen">
            <h1 id="resultText">WINNER!</h1>
            <p id="finalScore" style="font-size: 20px; color: #888;"></p>
            <p id="streakMsg" style="color: #6dd5ed; font-weight: bold; margin-top: 10px; display: none;">NEW STREAK RECORD!</p>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

// UI and Persistence
let streak = localStorage.getItem('pingPongStreak') || 0;
document.getElementById('bestStreak').textContent = streak;
document.getElementById('recordWins').textContent = streak;

const WINNING_SCORE = 7;
const PADDLE_WIDTH = 80;
const PADDLE_HEIGHT = 10;
const BALL_RADIUS = 7;
const INITIAL_BALL_SPEED = 4.5;

let gameState = 'START';
let playerScore = 0;
let aiScore = 0;
let loopId;

const ball = { x: 200, y: 300, vx: 0, vy: 0, speed: INITIAL_BALL_SPEED };
const player = { x: 160, y: 570, w: PADDLE_WIDTH, h: PADDLE_HEIGHT, targetX: 160 };
const ai = { x: 160, y: 20, w: PADDLE_WIDTH, h: PADDLE_HEIGHT, speed: 3.8 };

/* --- Inputs --- */
function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) * scaleX;
}

canvas.addEventListener('mousemove', (e) => player.targetX = getMousePos(e) - player.w / 2);
canvas.addEventListener('touchmove', (e) => {
    if (gameState === 'PLAYING') e.preventDefault();
    player.targetX = getMousePos(e) - player.w / 2;
}, { passive: false });

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* --- Logic --- */
function resetBall(winner) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.speed = INITIAL_BALL_SPEED;
    let angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
    let dir = winner === 'player' ? -1 : 1;
    ball.vx = ball.speed * Math.sin(angle);
    ball.vy = dir * ball.speed * Math.cos(angle);
}

function update() {
    if (gameState !== 'PLAYING') return;

    // Player Move
    if (keys['a'] || keys['arrowleft']) player.targetX -= 10;
    if (keys['d'] || keys['arrowright']) player.targetX += 10;
    player.x += (player.targetX - player.x) * 0.25;
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // AI Move (Dynamic Difficulty)
    let aiCenter = ai.x + ai.w / 2;
    let reactionSpeed = ai.speed + (playerScore * 0.1);
    if (aiCenter < ball.x - 10) ai.x += reactionSpeed;
    else if (aiCenter > ball.x + 10) ai.x -= reactionSpeed;
    ai.x = Math.max(0, Math.min(canvas.width - ai.w, ai.x));

    // Ball Move
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall Bounce
    if (ball.x < BALL_RADIUS || ball.x > canvas.width - BALL_RADIUS) {
        ball.vx = -ball.vx;
        ball.x = ball.x < BALL_RADIUS ? BALL_RADIUS : canvas.width - BALL_RADIUS;
    }

    // Paddle Hits
    if (ball.vy > 0 && ball.y + BALL_RADIUS > player.y && ball.x > player.x && ball.x < player.x + player.w) {
        collide(player);
    }
    if (ball.vy < 0 && ball.y - BALL_RADIUS < ai.y + ai.h && ball.x > ai.x && ball.x < ai.x + ai.w) {
        collide(ai);
    }

    // Score
    if (ball.y < 0) scorePoint('player');
    if (ball.y > canvas.height) scorePoint('ai');
}

function collide(paddle) {
    ball.vy = -ball.vy;
    let hitPoint = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    let angle = (Math.PI / 3) * hitPoint;
    ball.speed = Math.min(ball.speed + 0.4, 12);
    ball.vx = ball.speed * Math.sin(angle);
    ball.vy = (ball.y > 300 ? -1 : 1) * ball.speed * Math.cos(angle);
}

function scorePoint(who) {
    if (who === 'player') {
        playerScore++;
        document.getElementById('playerScore').textContent = playerScore;
    } else {
        aiScore++;
        document.getElementById('aiScore').textContent = aiScore;
    }
    
    container.classList.add('shake');
    setTimeout(() => container.classList.remove('shake'), 300);

    if (playerScore >= WINNING_SCORE || aiScore >= WINNING_SCORE) {
        endGame();
    } else {
        resetBall(who);
    }
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 400, 600);

    // Mid line
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.setLineDash([15, 15]);
    ctx.strokeRect(0, 300, 400, 0);
    ctx.setLineDash([]);

    // Paddles
    ctx.fillStyle = '#2193b0';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#ff4757';
    ctx.fillRect(ai.x, ai.y, ai.w, ai.h);

    // Ball
    ctx.shadowBlur = 10; ctx.shadowColor = 'white';
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function gameLoop() {
    update();
    draw();
    loopId = requestAnimationFrame(gameLoop);
}

function startGame() {
    gameState = 'PLAYING';
    playerScore = 0; aiScore = 0;
    document.getElementById('playerScore').textContent = '0';
    document.getElementById('aiScore').textContent = '0';
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('streakMsg').style.display = 'none';
    resetBall('player');
    if (!loopId) gameLoop();
}

function endGame() {
    gameState = 'GAME_OVER';
    document.getElementById('finalScore').textContent = `YOU ${playerScore} - ${aiScore} CPU`;
    
    if (playerScore > aiScore) {
        document.getElementById('resultText').textContent = "🎉 VICTORY!";
        document.getElementById('resultText').style.color = "#6dd5ed";
        streak++;
        if (streak > (localStorage.getItem('pingPongStreak') || 0)) {
            localStorage.setItem('pingPongStreak', streak);
            document.getElementById('streakMsg').style.display = 'block';
        }
    } else {
        document.getElementById('resultText').textContent = "🤖 DEFEAT";
        document.getElementById('resultText').style.color = "#ff4757";
        streak = 0;
    }
    
    document.getElementById('bestStreak').textContent = localStorage.getItem('pingPongStreak') || 0;
    document.getElementById('recordWins').textContent = streak;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
draw();
</script>
</body>
</html>
