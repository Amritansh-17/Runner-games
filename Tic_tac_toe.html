<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tic Tac Toe ❌⭕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
  display: flex; justify-content: center; align-items: center;
  overflow: hidden; overscroll-behavior: none;
}
#gameContainer {
  position: relative;
  width: min(90vw, 90vh);
  aspect-ratio: 1 / 1;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  padding: 10px;
  display: flex; justify-content: center; align-items: center;
}
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%; height: 100%;
}
.cell {
  background: rgba(255, 255, 255, 0.15);
  border-radius: 12px;
  display: flex; justify-content: center; align-items: center;
  font-size: clamp(40px, 15vw, 80px);
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.cell:hover:not(.taken) { background: rgba(255, 255, 255, 0.25); transform: scale(0.98); }
.cell.taken { cursor: default; }
.cell.x { color: #4facfe; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.cell.o { color: #f093fb; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.cell.win { background: rgba(255, 215, 0, 0.3); animation: pulse 0.5s ease infinite alternate; }

@keyframes pulse { to { transform: scale(1.05); } }

/* Screens */
.screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(6px);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; padding: clamp(15px, 4vw, 25px);
  z-index: 20; pointer-events: auto; transition: opacity 0.3s;
}
.screen.hidden { display: none; }
h1 { font-size: clamp(24px, 7vw, 34px); color: white; margin-bottom: 12px; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
.info { color: rgba(255,255,255,0.85); font-size: clamp(13px, 3.5vw, 16px); margin: 8px 0; line-height: 1.5; max-width: 90%; }
.turn-info { color: #FFD700; font-size: clamp(14px, 4vw, 18px); margin: 10px 0; font-weight: 500; }
.btn {
  padding: clamp(10px, 2.5vw, 14px) clamp(24px, 6vw, 40px);
  font-size: clamp(14px, 4vw, 20px);
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
  margin-top: clamp(12px, 3vw, 20px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s;
  min-width: 140px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); filter: brightness(1.1); }
.btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

/* ✅ CLOSE BUTTON (27px, Red, Perfectly Centered) */
.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  color: #ff4757;
  font-size: 27px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 30;
  font-family: system-ui, sans-serif;
  user-select: none;
  backdrop-filter: blur(4px);
}
.close-btn:hover { background: rgba(255, 255, 255, 0.35); transform: scale(1.1); }
.close-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div id="gameContainer">
  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <!-- Start Screen -->
  <div class="screen" id="startScreen">
    <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
    <h1>Tic Tac Toe ❌⭕</h1>
    <p class="info">Challenge the AI! First turn alternates every game.</p>
    <p class="turn-info" id="startTurnInfo">You go first! (X)</p>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <!-- Game Over Screen -->
  <div class="screen hidden" id="gameOverScreen">
    <a href="index.html" class="close-btn" title="Back to Home">&times;</a>
    <h1 id="resultText">Draw!</h1>
    <button class="btn" id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

<script>
const cells = document.querySelectorAll('.cell');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const startTurnInfo = document.getElementById('startTurnInfo');
const resultText = document.getElementById('resultText');

let board = Array(9).fill('');
let currentPlayer = 'X'; // X = Player, O = AI
let gameActive = false;
let playerStarts = true; // Alternates each game
const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function updateTurnInfo() {
  startTurnInfo.textContent = playerStarts ? "You go first! (X)" : "AI goes first. (O)";
}

function initGame() {
  board.fill('');
  cells.forEach(c => {
    c.textContent = '';
    c.classList.remove('taken', 'x', 'o', 'win');
  });
  gameActive = true;
  currentPlayer = playerStarts ? 'X' : 'O';
  playerStarts = !playerStarts;
  updateTurnInfo();
  
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');

  if (currentPlayer === 'O') {
    setTimeout(makeAIMove, 600);
  }
}

function checkWin(player) {
  return winCombos.some(combo => combo.every(idx => board[idx] === player));
}

function highlightWin(player) {
  winCombos.forEach(combo => {
    if (combo.every(idx => board[idx] === player)) {
      combo.forEach(idx => cells[idx].classList.add('win'));
    }
  });
}

function checkDraw() {
  return board.every(cell => cell !== '');
}

function endGame(message) {
  gameActive = false;
  resultText.textContent = message;
  setTimeout(() => gameOverScreen.classList.remove('hidden'), 800);
}

function handleCellClick(e) {
  const idx = parseInt(e.target.dataset.index);
  if (!gameActive || board[idx] !== '' || currentPlayer !== 'X') return;

  placeMove(idx, 'X');
  if (checkEndState()) return;

  currentPlayer = 'O';
  setTimeout(makeAIMove, 400 + Math.random() * 300); // Realistic delay
}

function placeMove(idx, player) {
  board[idx] = player;
  const cell = cells[idx];
  cell.textContent = player;
  cell.classList.add('taken', player.toLowerCase());
}

function checkEndState() {
  if (checkWin(currentPlayer)) {
    highlightWin(currentPlayer);
    endGame(currentPlayer === 'X' ? "🎉 You Win!" : "🤖 AI Wins!");
    return true;
  }
  if (checkDraw()) {
    endGame("🤝 It's a Draw!");
    return true;
  }
  return false;
}

// 🔹 SMART BUT BEATABLE AI
function getBestMove() {
  // 1. Win if possible
  for (let i = 0; i < 9; i++) {
    if (board[i] === '') {
      board[i] = 'O';
      if (checkWin('O')) { board[i] = ''; return i; }
      board[i] = '';
    }
  }
  // 2. Block player win
  for (let i = 0; i < 9; i++) {
    if (board[i] === '') {
      board[i] = 'X';
      if (checkWin('X')) { board[i] = ''; return i; }
      board[i] = '';
    }
  }
  // 3. Take center
  if (board[4] === '') return 4;
  // 4. Take opposite corner
  const corners = [0, 2, 6, 8];
  const opposites = {0:8, 2:6, 6:2, 8:0};
  for (let c of corners) {
    if (board[c] === 'X' && board[opposites[c]] === '') return opposites[c];
  }
  // 5. Take empty corner
  for (let c of corners) {
    if (board[c] === '') return c;
  }
  // 6. Take empty edge
  const edges = [1, 3, 5, 7];
  for (let e of edges) {
    if (board[e] === '') return e;
  }
  return -1;
}

function makeAIMove() {
  if (!gameActive) return;
  
  const available = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
  if (available.length === 0) return;

  // 25% chance to make a random (suboptimal) move -> makes it beatable
  let move;
  if (Math.random() < 0.25) {
    move = available[Math.floor(Math.random() * available.length)];
  } else {
    move = getBestMove();
  }

  placeMove(move, 'O');
  if (checkEndState()) return;

  currentPlayer = 'X';
}

// Event Listeners
cells.forEach(cell => cell.addEventListener('click', handleCellClick));
cells.forEach(cell => cell.addEventListener('touchstart', e => { e.preventDefault(); handleCellClick(e); }, {passive: false}));

startBtn.addEventListener('click', initGame);
restartBtn.addEventListener('click', initGame);

// Init on load
updateTurnInfo();
</script>
</body>
</html>
