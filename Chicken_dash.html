<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chicken Dash 🐣</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
html, body {
    width: 100%; height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
}
#gameContainer {
    position: relative;
    width: min(96vw, 96vh * 3 / 2);
    aspect-ratio: 3 / 2;
    max-width: 600px;
    background: #87CEEB;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border-radius: 16px;
    overflow: hidden;
    border: 4px solid #fff;
}
canvas { display: block; width: 100%; height: 100%; }
.ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
.score-board {
    position: absolute; top: 20px; left: 20px;
    font-size: clamp(18px, 4vw, 24px); font-weight: bold; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3); z-index: 10;
}
.high-score-board {
    position: absolute; top: 20px; right: 70px;
    font-size: clamp(14px, 3.5vw, 18px); font-weight: bold;
    color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); z-index: 10;
}
.screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 20px; z-index: 20; pointer-events: auto;
}
.screen.hidden { display: none; }
h1 { font-size: clamp(28px, 8vw, 42px); color: white; margin-bottom: 10px; }
.info { color: white; font-size: 16px; margin-bottom: 5px; opacity: 0.9; }
.btn {
    padding: 12px 40px; font-size: 18px;
    background: #FFD700; color: #333; border: none; border-radius: 50px;
    cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    margin-top: 20px;
}
.close-btn {
    position: absolute; top: 15px; right: 15px;
    width: 40px; height: 40px;
    background: rgba(255, 255, 255, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    color: #ff4757; font-size: 27px; font-weight: bold;
    display: flex; justify-content: center; align-items: center;
    text-decoration: none; z-index: 30; pointer-events: auto;
}
</style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="ui-layer">
        <div class="score-board">Score: <span id="score">0</span></div>
        <div class="high-score-board">Best: <span id="highScore">0</span></div>
        <a href="index.html" class="close-btn">&times;</a>
        <div class="screen" id="startScreen">
            <h1>🐣 Chicken Dash</h1>
            <p class="info">Jump over the eggs!</p>
            <p class="info" style="color: #FFD700; font-weight: bold;">Personal Best: <span id="startHighScore">0</span></p>
            <button class="btn" id="startBtn">START RUN</button>
        </div>
        <div class="screen hidden" id="gameOverScreen">
            <h1>Oops! 🍳</h1>
            <p class="info">Final Score: <span id="finalScore">0</span></p>
            <p class="info" style="color: #FFD700;">Best: <span id="bestScoreDisplay">0</span></p>
            <button class="btn" id="restartBtn">TRY AGAIN</button>
        </div>
    </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const startHighScoreEl = document.getElementById('startHighScore');
const bestScoreDisplay = document.getElementById('bestScoreDisplay');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');

let gameState = 'START';
let score = 0;
let highScore = parseInt(localStorage.getItem('chickenHighScore')) || 0;
let gameSpeed = 5;
let frame = 0;
let lastSpawnFrame = 0;
let obstacles = [];
const gravity = 0.8;

highScoreEl.textContent = highScore;
startHighScoreEl.textContent = highScore;

const chicken = { x: 80, y: 300, width: 50, height: 50, dy: 0, jumpForce: -15, grounded: false, wingAngle: 0 };

function drawChicken() {
    ctx.save();
    ctx.translate(chicken.x + 25, chicken.y + 25);
    if (!chicken.grounded) ctx.scale(0.9, 1.1);
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f44336';
    ctx.beginPath(); ctx.arc(-5, -22, 6, 0, Math.PI * 2); ctx.arc(5, -24, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF9800';
    ctx.beginPath(); ctx.moveTo(18, -2); ctx.lineTo(28, 4); ctx.lineTo(18, 10); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(8, -5, 3, 0, Math.PI * 2); ctx.fill();
    chicken.wingAngle = Math.sin(frame * 0.2) * 0.4;
    ctx.rotate(chicken.wingAngle);
    ctx.fillStyle = '#FDD835';
    ctx.beginPath(); ctx.ellipse(-10, 5, 12, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawEgg(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0, 0, 15, 20, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
}

function drawBackground() {
    ctx.fillStyle = '#7CB342';
    ctx.fillRect(0, 340, canvas.width, 60);
    ctx.strokeStyle = '#558B2F';
    ctx.setLineDash([10, 20]);
    ctx.lineDashOffset = frame * gameSpeed;
    ctx.beginPath();
    ctx.moveTo(0, 350); ctx.lineTo(canvas.width, 350);
    ctx.moveTo(0, 380); ctx.lineTo(canvas.width, 380);
    ctx.stroke();
    ctx.setLineDash([]);
}

function spawnObstacle() {
    let minGap = 60; // Fair spacing
    if (frame - lastSpawnFrame > minGap && Math.random() < 0.02) {
        obstacles.push({ x: canvas.width + 50, y: 325, width: 30, height: 40 });
        lastSpawnFrame = frame;
    }
}

function update() {
    if (gameState !== 'PLAYING') return;
    frame++;
    gameSpeed = 5 + (score * 0.15); 
    chicken.dy += gravity;
    chicken.y += chicken.dy;
    if (chicken.y > 340 - chicken.height) {
        chicken.y = 340 - chicken.height;
        chicken.dy = 0; chicken.grounded = true;
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;
        const hitX = chicken.x + 12 < obstacles[i].x + obstacles[i].width && chicken.x + chicken.width - 12 > obstacles[i].x;
        const hitY = chicken.y + chicken.height > obstacles[i].y - 5;
        if (hitX && hitY) endGame();
        if (obstacles[i].x < -50) { obstacles.splice(i, 1); score++; scoreEl.textContent = score; }
    }
    spawnObstacle();
}

function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground(); obstacles.forEach(obs => drawEgg(obs.x + 15, obs.y)); drawChicken(); }
function loop() { update(); draw(); requestAnimationFrame(loop); }
function jump() { if (gameState === 'PLAYING' && chicken.grounded) { chicken.dy = chicken.jumpForce; chicken.grounded = false; } }

window.addEventListener('keydown', e => { if (e.code === 'Space' || e.key === 'ArrowUp') jump(); });
canvas.addEventListener('mousedown', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive: false});

function startGame() {
    score = 0; gameSpeed = 5; obstacles = []; chicken.y = 200; frame = 0; lastSpawnFrame = 0;
    scoreEl.textContent = "0"; gameState = 'PLAYING';
    startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden');
}

function endGame() {
    gameState = 'GAME_OVER';
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('chickenHighScore', highScore);
        highScoreEl.textContent = highScore;
        startHighScoreEl.textContent = highScore;
    }
    finalScoreEl.textContent = score;
    bestScoreDisplay.textContent = highScore;
    gameOverScreen.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
loop();
</script>
</body>
</html>
